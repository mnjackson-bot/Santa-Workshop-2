<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Checkout - Santa Workshop</title>
  <link rel="stylesheet" href="https://www.w3schools.com/w3css/5/w3.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
  <style>
    /* Christmas theme styles */
    .christmas-banner { background: linear-gradient(135deg,#b30000,#006600); color: #fff; }
    .christmas-banner h2 { margin: 0; font-weight: 700; letter-spacing: 0.5px; }
    .christmas-pay { box-shadow: 0 2px 0 rgba(0,0,0,0.15); }
    /* Festive table rows */
    #cart-table tr:nth-child(odd) { background: rgba(240,248,255,0.6); }
    #cart-table tr:nth-child(even) { background: rgba(255,250,240,0.6); }
    /* Snowflake animation */
    .snowflakes { pointer-events: none; position: fixed; left: 0; top: 0; width: 100%; height: 100%; overflow: hidden; z-index: 9999; }
    .snowflake { position: absolute; color: #fff; font-size: 18px; user-select: none; opacity: 0.9; animation-name: fall; animation-timing-function: linear; }
    @keyframes fall {
      0% { transform: translateY(-10vh) translateX(0) rotate(0deg); opacity: 0.9 }
      100% { transform: translateY(110vh) translateX(30vw) rotate(360deg); opacity: 0.6 }
    }
    /* Position several snowflakes at different locations/speeds */
    .snowflake.s1 { left: 5%; animation-duration: 12s; animation-delay: 0s; }
    .snowflake.s2 { left: 20%; animation-duration: 16s; animation-delay: 2s; font-size:22px }
    .snowflake.s3 { left: 35%; animation-duration: 10s; animation-delay: 1s; }
    .snowflake.s4 { left: 50%; animation-duration: 18s; animation-delay: 3s; }
    .snowflake.s5 { left: 65%; animation-duration: 14s; animation-delay: 0.5s; }
    .snowflake.s6 { left: 80%; animation-duration: 20s; animation-delay: 4s; font-size:16px }
    .snowflake.s7 { left: 90%; animation-duration: 13s; animation-delay: 1.5s; }
    /* Make header links stand out */
    .christmas-banner .w3-button { background: rgba(255,255,255,0.9); color: #333; }
  </style>
</head>
<body class="w3-content" style="max-width:900px">
  <div class="snowflakes" aria-hidden="true">
    <span class="snowflake s1">❄</span>
    <span class="snowflake s2">❄</span>
    <span class="snowflake s3">❄</span>
    <span class="snowflake s4">❄</span>
    <span class="snowflake s5">❄</span>
    <span class="snowflake s6">❄</span>
    <span class="snowflake s7">❄</span>
  </div>
  <div class="w3-container w3-padding-16 w3-border-bottom">
    <div style="display: flex; align-items: center; margin-bottom: 16px;">
      <img src="download.png" alt="Santa Workshop Logo" style="height: 50px; width: auto; margin-right: 16px;">
      <h2 style="margin: 0; color: #b30000;">SANTA WORKSHOP</h2>
    </div>
    <div class="christmas-banner w3-padding-small">
      <h2>🎄 Checkout - Santa Workshop 🎅</h2>
    </div>
    <a href="index.html" class="w3-button w3-light-grey w3-small">&larr; Continue shopping</a>
  </div>

  <div class="w3-container w3-padding-16" id="cart-area">
    <p id="empty-msg" class="w3-text-grey">Loading cart…</p>
    <table id="cart-table" class="w3-table w3-striped w3-white" style="display:none">
      <thead>
        <tr>
          <th>Item</th>
          <th>Price</th>
          <th>Qty</th>
          <th>Subtotal</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="cart-body"></tbody>
      <tfoot>
        <tr>
          <td colspan="3" class="w3-right"><strong>Total:</strong></td>
          <td colspan="2" id="cart-total"></td>
        </tr>
      </tfoot>
    </table>
  </div>

  <div class="w3-container w3-padding-16 w3-border-top" id="checkout-form" style="display:none">
    <h3>Buyer Details</h3>
    <p><input id="buyer-name" class="w3-input w3-border" placeholder="Full name"></p>
    <p><input id="buyer-email" class="w3-input w3-border" placeholder="Email"></p>
    <p>
      <button id="pay-btn" class="w3-button w3-green christmas-pay">Pay with server (Stripe)</button>
      <button id="clear-btn" class="w3-button w3-red">Clear cart</button>
    </p>
    <p>Or pay with PayPal (no downloads required):</p>
    <div id="paypal-button-container"></div>
    <p id="status" class="w3-text-green"></p>
  </div>

<script>
// Helper: read cart from localStorage
function getCart(){
  try{ return JSON.parse(localStorage.getItem('cart') || '[]'); }catch(e){ return []; }
}
function saveCart(cart){ localStorage.setItem('cart', JSON.stringify(cart)); }
function formatMoney(n){ return '$' + Number(n).toFixed(2); }

function renderCart(){
  var cart = getCart();
  var body = document.getElementById('cart-body');
  var table = document.getElementById('cart-table');
  var empty = document.getElementById('empty-msg');
  var totalEl = document.getElementById('cart-total');
  body.innerHTML = '';
  if (!cart || cart.length === 0) {
    table.style.display = 'none';
    document.getElementById('checkout-form').style.display = 'none';
    empty.textContent = 'Your cart is empty.';
    empty.className = 'w3-text-grey';
    return;
  }
  table.style.display = '';
  document.getElementById('checkout-form').style.display = '';
  empty.style.display = 'none';
  var total = 0;
  cart.forEach(function(item, idx){
    var tr = document.createElement('tr');
    var subtotal = item.qty * Number(item.price);
    total += subtotal;
    tr.innerHTML = '<td>' + escapeHtml(item.name) + '</td>' +
                   '<td>' + formatMoney(item.price) + '</td>' +
                   '<td>' +
                     '<button data-idx="'+idx+'" class="w3-button w3-small w3-light-grey dec">-</button>'+
                     ' <span class="qty">'+item.qty+'</span> ' +
                     '<button data-idx="'+idx+'" class="w3-button w3-small w3-light-grey inc">+</button>'+
                   '</td>' +
                   '<td>' + formatMoney(subtotal) + '</td>' +
                   '<td><button data-idx="'+idx+'" class="w3-button w3-small w3-red remove">Remove</button></td>';
    body.appendChild(tr);
  });
  totalEl.textContent = formatMoney(total);
}

function escapeHtml(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// Delegate clicks for inc/dec/remove
document.addEventListener('click', function(e){
  var btn;
  if (btn = e.target.closest('.inc')){
    var idx = Number(btn.getAttribute('data-idx'));
    var cart = getCart(); cart[idx].qty += 1; saveCart(cart); renderCart();
  }
  if (btn = e.target.closest('.dec')){
    var idx = Number(btn.getAttribute('data-idx'));
    var cart = getCart(); if (cart[idx].qty > 1) cart[idx].qty -= 1; else cart.splice(idx,1); saveCart(cart); renderCart();
  }
  if (btn = e.target.closest('.remove')){
    var idx = Number(btn.getAttribute('data-idx'));
    var cart = getCart(); cart.splice(idx,1); saveCart(cart); renderCart();
  }
});

// Clear cart button
document.getElementById('clear-btn').addEventListener('click', function(){
  if (!confirm('Clear all items from your cart?')) return;
  localStorage.removeItem('cart'); renderCart();
});

// Real payment flow: create Stripe Checkout session on server and redirect
document.getElementById('pay-btn').addEventListener('click', async function(){
  var name = document.getElementById('buyer-name').value.trim();
  var email = document.getElementById('buyer-email').value.trim();
  var status = document.getElementById('status');
  if (!name || !email){ status.className = 'w3-text-red'; status.textContent = 'Please enter name and email.'; return; }
  var cart = getCart(); if (!cart || cart.length === 0){ status.className = 'w3-text-red'; status.textContent = 'Cart is empty.'; return; }
  status.className = 'w3-text-grey'; status.textContent = 'Creating secure checkout...';
  try {
    var res = await fetch('/create-checkout-session', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ items: cart, buyer: { name: name, email: email } })
    });
    var data = await res.json();
    if (data && data.url) {
      // Redirect to Stripe Checkout page
      window.location = data.url;
    } else {
      status.className = 'w3-text-red';
      status.textContent = data.error || 'Failed to create checkout session.';
    }
  } catch (err) {
    status.className = 'w3-text-red';
    status.textContent = 'Network error: ' + err.message;
  }
});

// Initial render
renderCart();

// --- PayPal client-only integration (Sandbox) ---
// Load PayPal Buttons using the sandbox 'sb' client-id; this works without a server for testing.
(function renderPayPal(){
  // Insert PayPal SDK script
  var ps = document.createElement('script');
  ps.src = 'https://www.paypal.com/sdk/js?client-id=sb&currency=USD';
  ps.onload = function(){
    // Helper to compute current cart total
    function cartTotal(){
      var cart = getCart();
      return cart.reduce(function(sum,i){ return sum + i.qty * Number(i.price); }, 0);
    }

    if (!window.paypal) return;
    paypal.Buttons({
      style: { layout: 'vertical' },
      createOrder: function(data, actions){
        var total = cartTotal();
        if (total <= 0) return actions.reject();
        return actions.order.create({
          purchase_units: [{ amount: { value: total.toFixed(2) } }]
        });
      },
      onApprove: function(data, actions){
        return actions.order.capture().then(function(details){
          document.getElementById('status').className = 'w3-text-green';
          document.getElementById('status').innerHTML = 'Payment completed by ' + (details.payer.name && details.payer.name.given_name ? details.payer.name.given_name : 'payer') + '. Transaction ID: ' + details.id;
          try { localStorage.removeItem('cart'); } catch(e){}
          renderCart();
        });
      },
      onError: function(err){
        document.getElementById('status').className = 'w3-text-red';
        document.getElementById('status').textContent = 'PayPal error: ' + (err && err.message ? err.message : err);
      }
    }).render('#paypal-button-container');
  };
  document.head.appendChild(ps);
})();
</script>
</body>
</html>
